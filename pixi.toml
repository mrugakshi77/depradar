[workspace]
name = "depradar"
version = "2.0.0"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
postgresql = "16.*"

[pypi-dependencies]
fastapi = "==0.111.0"
uvicorn = {version = "==0.29.0", extras = ["standard"]}
sqlalchemy = "==2.0.30"
asyncpg = "==0.29.0"
httpx = "==0.27.0"
pydantic = "==2.7.1"
pydantic-settings = "==2.2.1"
python-dotenv = "==1.0.1"
packaging = "==24.0"
greenlet = "==3.0.3"
typer = ">=0.15.0"
rich = "==13.7.1"

[tasks]
db-init   = "initdb -D .pixi/pgdata --no-locale --encoding=UTF8 -U radaruser || true"
db-start  = "pg_ctl -D .pixi/pgdata -l .pixi/pg.log start || true"
db-stop   = "pg_ctl -D .pixi/pgdata stop || true"
db-create = "createdb -U radaruser radardb || true"
db-setup  = { depends-on = ["db-init", "db-start", "db-create"] }
dev       = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

db-clear = "python scripts/clear_cache.py"
