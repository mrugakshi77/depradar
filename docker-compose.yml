version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: depradar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radaruser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radarpass}
      POSTGRES_DB: ${POSTGRES_DB:-radardb}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radaruser} -d ${POSTGRES_DB:-radardb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: depradar_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./frontend:/app/frontend
      - ./cli:/app/cli
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pg_data:
    name: depradar_pgdata
